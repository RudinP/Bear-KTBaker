appId: com.rudin.bear.ktbaker
productName: Bear KTBaker
files:
  - dist/**
  - dist-electron/**
extraResources:
  - from: resources/templates
    to: templates
directories:
  buildResources: resources
  output: release
mac:
  category: public.app-category.graphics-design
  icon: AppIcon.icon
  # Keep local Apple Development identities out of distributable metadata.
  # Replace this with an explicit Developer ID identity only for notarized releases.
  identity: "-"
  target: [dmg, zip]
win:
  target: [nsis]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
